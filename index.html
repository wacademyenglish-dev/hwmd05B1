<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WOLF LABS | The Post-Mortem (HW)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Space+Grotesk:wght@400;500;700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-void: #0B0F19;        
            --bg-panel: #151A28;       
            --accent-brand: #8B5CF6;   
            --accent-alert: #FF6F61;   
            --accent-success: #10B981; 
            --accent-danger: #F43F5E;  
            --text-main: #F8FAFC;      
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: var(--bg-void);
            color: var(--text-main);
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation; 
        }

        .font-display { font-family: 'Outfit', sans-serif; letter-spacing: -0.01em; }
        .font-code { font-family: 'Fira Code', monospace; }

        #app-container {
            max-width: 480px; margin: 0 auto; height: 100vh; height: 100dvh;
            background-color: var(--bg-void); display: flex; flex-col; position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5); border-left: 1px solid rgba(139, 92, 246, 0.1); border-right: 1px solid rgba(139, 92, 246, 0.1);
        }

        .top-bar { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(11, 15, 25, 0.95); z-index: 10; }
        .progress-track { width: 100%; height: 6px; background: #1E293B; border-radius: 3px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; background: var(--accent-brand); width: 0%; transition: width 0.3s ease; }

        #question-area { flex-grow: 1; overflow-y: auto; padding: 24px; padding-bottom: 100px; }

        .option-btn {
            width: 100%; background: var(--bg-panel); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
            padding: 16px 20px; text-align: left; font-size: 1.05rem; margin-bottom: 12px; color: var(--text-main);
            transition: all 0.2s; display: flex; align-items: center; font-weight: 500;
        }
        .option-btn:active { transform: scale(0.98); }
        .option-btn.correct { background: rgba(16, 185, 129, 0.15); border-color: var(--accent-success); color: var(--accent-success); }
        .option-btn.wrong { background: rgba(244, 63, 94, 0.15); border-color: var(--accent-danger); color: #FDA4AF; }
        
        .option-letter {
            width: 32px; height: 32px; border-radius: 8px; background: var(--bg-void); display: flex; align-items: center; justify-content: center;
            font-family: 'Fira Code', monospace; font-weight: bold; margin-right: 16px; color: #94A3B8; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.1);
        }
        .option-btn.correct .option-letter { background: var(--accent-success); color: #000; border-color: transparent;}
        .option-btn.wrong .option-letter { background: var(--accent-danger); color: #fff; border-color: transparent;}

        .slide-in { animation: slideIn 0.4s ease forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(3px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body>

<div id="app-container" class="flex flex-col">
    
    <div id="start-screen" class="flex flex-col items-center justify-center h-full p-8 text-center bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PGNpcmNsZSBjeD0iMTAiIGN5PSIxMCIgcj0iMSIgZmlsbD0icmdiYSgxMzksIDkyLCAyNDYsIDAuMDgpIi8+PC9zdmc+')]">
        <div class="w-24 h-24 bg-[var(--bg-panel)] border border-[var(--accent-alert)] rounded-2xl flex items-center justify-center mb-8 shadow-[0_0_30px_rgba(255,111,97,0.3)]">
            <i class="fas fa-search text-5xl text-[var(--accent-alert)]"></i>
        </div>
        <p class="font-code text-[var(--accent-alert)] text-xs tracking-[0.3em] mb-2 uppercase">Mobile Training</p>
        <h1 class="font-display text-4xl font-black text-white mb-4 leading-tight">The <br>Post-Mortem</h1>
        <p class="text-gray-400 text-sm mb-12 font-medium px-4">15 questions to lock in Past Modals (Should have, Must have, Might have).</p>
        <button onclick="startQuiz()" class="w-full py-4 bg-gradient-to-r from-[var(--accent-alert)] to-rose-900 text-white font-display font-bold text-lg uppercase tracking-widest rounded-xl shadow-[0_4px_15px_rgba(255,111,97,0.4)] transition-transform active:scale-95">Start Autopsy</button>
    </div>

    <div id="quiz-ui" class="hidden flex-col h-full w-full">
        <div class="top-bar">
            <div class="flex justify-between items-center font-code text-xs font-bold text-gray-400 uppercase tracking-widest">
                <span id="q-counter">Q 1/15</span>
                <span id="score-display" class="text-[var(--accent-brand)]">0 XP</span>
            </div>
            <div class="progress-track"><div id="progress-bar" class="progress-fill"></div></div>
        </div>
        <div id="question-area" class="flex flex-col justify-center"></div>
    </div>

    <div id="wrap-screen" class="hidden flex-col items-center justify-center h-full p-8 text-center relative">
        <div class="bg-[var(--bg-panel)] border border-[var(--accent-brand)]/30 w-full text-center relative z-10 p-10 rounded-2xl shadow-2xl">
            <i class="fas fa-clipboard-check text-6xl text-[var(--accent-success)] mb-6"></i>
            <h2 class="font-display text-3xl font-black text-white mb-2 uppercase">Report Filed</h2>
            <p class="font-body text-gray-400 mb-8 text-sm">Past deductions mastered.</p>
            
            <div class="bg-[var(--bg-void)] border border-gray-800 p-4 mb-8 rounded-xl">
                <p class="text-[10px] font-code text-gray-500 uppercase tracking-widest mb-1">Final Score</p>
                <p id="final-score" class="font-display font-black text-4xl text-[var(--accent-brand)]">0/15</p>
            </div>
            
            <button onclick="location.reload()" class="w-full py-4 bg-transparent border border-[var(--accent-brand)] text-[var(--accent-brand)] font-display font-bold uppercase tracking-widest hover:bg-[var(--accent-brand)] hover:text-white transition-colors rounded-xl">Return to Dashboard</button>
        </div>
    </div>

</div>

<script>
    const quizData = [
        // Vocab
        { q: "A meeting to discuss what went wrong after a project is finished is a...", opts: ["Pre-mortem", "Post-mortem", "Backlog"], ans: 1 },
        { q: "Understanding a situation only AFTER it has happened is called...", opts: ["Hindsight", "Oversight", "Foresight"], ans: 0 },
        { q: "To make a big mistake or do something badly is to...", opts: ["Mess up", "Back out", "Bounce back"], ans: 0 },
        
        // Should have
        { q: "Regret: The project failed. We _____ tested it more.", opts: ["should", "should have", "should had"], ans: 1 },
        { q: "Regret: We _____ launched the app with so many bugs.", opts: ["shouldn't have", "mustn't have", "don't have"], ans: 0 },
        { q: "Read: 'I should have call the client.' What's the error?", opts: ["It should be 'should called'", "It should be 'should have called'", "No error"], ans: 1 },
        
        // Must have
        { q: "Deduction (99% sure): The server crashed. It _____ been the new update.", opts: ["should have", "must have", "might have"], ans: 1 },
        { q: "Deduction: He didn't answer the phone. He _____ left the office.", opts: ["must has", "must have", "must had"], ans: 1 },
        { q: "Read: 'They must have forget the meeting.' What's the error?", opts: ["It should be 'must have forgotten'", "It should be 'must forgot'", "No error"], ans: 0 },
        
        // Might have / Could have
        { q: "Guess (50% sure): I don't know why she quit. She _____ been unhappy with her salary.", opts: ["should have", "must have", "might have"], ans: 2 },
        { q: "Missed Opportunity: We _____ won the contract, but our price was too high.", opts: ["could have", "should have", "must have"], ans: 0 },
        
        // Discrimination
        { q: "Which sentence expresses a REGRET/MISTAKE?", opts: ["We must have lost the file.", "We might have lost the file.", "We should not have lost the file."], ans: 2 },
        { q: "Which sentence is a LOGICAL DEDUCTION (You are almost sure)?", opts: ["The boss must have read the report.", "The boss should have read the report.", "The boss might have read the report."], ans: 0 },
        
        // Mixed & Application
        { q: "Client: 'Why didn't anyone tell me?' You reply (Regret):", opts: ["We could have told you.", "We should have told you.", "We might have told you."], ans: 1 },
        { q: "A deal fails at the last minute. You say: 'The investors _____.'", opts: ["backed out", "bounced back", "fell through"], ans: 0 }
    ];

    let currentQ = 0; let score = 0; let locked = false;

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-ui').classList.remove('hidden'); document.getElementById('quiz-ui').classList.add('flex');
        loadQuestion();
    }

    function loadQuestion() {
        locked = false; const qData = quizData[currentQ]; const pct = ((currentQ) / quizData.length) * 100;
        
        document.getElementById('progress-bar').style.width = `${pct}%`;
        document.getElementById('q-counter').innerText = `Q ${currentQ + 1}/${quizData.length}`;

        let optsHtml = qData.opts.map((opt, i) => `
            <button class="option-btn" onclick="checkAnswer(${i}, this)">
                <div class="option-letter">${String.fromCharCode(65 + i)}</div>
                <div class="flex-1">${opt}</div>
            </button>
        `).join('');

        const html = `
            <div class="slide-in w-full">
                <p class="text-[10px] font-code text-[var(--accent-alert)] uppercase tracking-[0.3em] mb-4 bg-[var(--accent-alert)]/10 inline-block px-3 py-1 rounded border border-[var(--accent-alert)]/30">B1 Check</p>
                <h2 class="text-2xl font-bold text-white mb-8 leading-relaxed font-body">${qData.q.replace(/_____/g, '<span class="text-[var(--accent-brand)] border-b-2 border-[var(--accent-brand)]">_____</span>')}</h2>
                <div class="space-y-3 font-body">${optsHtml}</div>
            </div>
        `;
        document.getElementById('question-area').innerHTML = html;
    }

    function checkAnswer(idx, btn) {
        if (locked) return; locked = true;
        const isCorrect = (idx === quizData[currentQ].ans); const allBtns = document.querySelectorAll('.option-btn');
        
        if (isCorrect) {
            btn.classList.add('correct'); score++; document.getElementById('score-display').innerText = `${score * 10} XP`;
        } else {
            btn.classList.add('wrong', 'shake'); allBtns[quizData[currentQ].ans].classList.add('correct');
            navigator.vibrate && navigator.vibrate(200);
        }

        setTimeout(() => { currentQ++; if (currentQ < quizData.length) loadQuestion(); else showWrap(); }, 1200);
    }

    function showWrap() {
        document.getElementById('quiz-ui').classList.remove('flex'); document.getElementById('quiz-ui').classList.add('hidden');
        document.getElementById('wrap-screen').classList.remove('hidden'); document.getElementById('wrap-screen').classList.add('flex');
        document.getElementById('progress-bar').style.width = `100%`; document.getElementById('final-score').innerText = `${score}/${quizData.length}`;
        if(score === quizData.length) document.getElementById('final-score').classList.replace('text-[var(--accent-brand)]', 'text-[var(--accent-success)]');
    }
</script>
</body>
</html>
